<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelSecure - Coming Soon</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #1A1A2E; /* Dark blue-purple background for contrast */
            color: #ffffff;
            height: 100%;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 3rem;
        }
        .logo {
            width: 400px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(143, 43, 188, 0.5)); /* Glow matching logo color */
        }
        #countdown {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: rgba(143, 43, 188, 0.2); /* Slight purple tint */
            padding: 1rem 2rem;
            border-radius: 50px;
        }
        .tagline {
            font-size: 2rem;
            margin-bottom: 3rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/ajclausen/sentinelsecure/e37e76718e42e1602e153ebc9d0e2da735c0c60b/logo.png" alt="SentinelSecure Logo" class="logo">
        </div>
        <p class="tagline">Your Trusted IT Security Partner</p>
        <div id="countdown">Coming Soon</div>
    </div>
    <script>
        const countDownDate = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 1).getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "We're Live!";
            }
        }, 1000);
    </script>
</body>
</html>

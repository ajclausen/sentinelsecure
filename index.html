<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelSecure - Coming Soon</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2E0854, #4A0E8F);
            color: #ffffff;
            height: 100%;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
            background-color: #8F2BBC;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #countdown {
            font-size: 2rem;
            margin-bottom: 2rem;
            background: rgba(143, 43, 188, 0.2);
            padding: 1rem 2rem;
            border-radius: 50px;
        }
        .tagline {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-style: italic;
        }
        .tech-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SS</div>
        <p class="tagline">Your Trusted IT Security Partner</p>
        <div id="countdown">Coming Soon</div>
    </div>
    <svg class="tech-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect x="10" y="10" width="80" height="80" fill="none" stroke="#8F2BBC" stroke-width="0.5"/>
        <circle cx="50" cy="50" r="30" fill="none" stroke="#8F2BBC" stroke-width="0.5"/>
        <path d="M20,50 Q50,20 80,50 T20,50" fill="none" stroke="#8F2BBC" stroke-width="0.5"/>
        <path d="M50,20 Q80,50 50,80 T50,20" fill="none" stroke="#8F2BBC" stroke-width="0.5"/>
    </svg>
    <script>
        // Set the date we're counting down to (first day of next month)
        const today = new Date();
        const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);
        const countDownDate = nextMonth.getTime();

        // Update the countdown every 1 second
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "We're Live!";
            }
        }, 1000);
    </script>
</body>
</html>
